<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFF5F0">
<title>喵健身</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFF5F0;--surface:#FFFFFF;--surface2:#FFF8F4;--surface3:#FFEDE4;--accent:#FF8C6B;--accent2:#FF6F4E;--accent-soft:rgba(255,140,107,0.12);--mint:#7ECFB3;--mint-soft:rgba(126,207,179,0.12);--pink:#FFB0C8;--pink-soft:rgba(255,176,200,0.15);--sky:#8AC6FF;--sky-soft:rgba(138,198,255,0.12);--lavender:#C3A6FF;--lavender-soft:rgba(195,166,255,0.12);--text:#4A3728;--text2:#9A8578;--text3:#C4B5AA;--border:rgba(74,55,40,0.06);--shadow:0 2px 12px rgba(74,55,40,0.06);--shadow-lg:0 4px 20px rgba(74,55,40,0.08);--radius:20px;--radius-sm:14px;--nav-height:72px;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;padding-bottom:calc(var(--nav-height) + var(--safe-bottom) + 16px)}
body::before{content:'';position:fixed;top:-120px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(255,176,200,0.2) 0%,transparent 70%);border-radius:50%;z-index:0;pointer-events:none}
body::after{content:'';position:fixed;bottom:100px;left:-60px;width:250px;height:250px;background:radial-gradient(circle,rgba(195,166,255,0.15) 0%,transparent 70%);border-radius:50%;z-index:0;pointer-events:none}
button{font-family:inherit;border:none;cursor:pointer}input,select,textarea{font-family:inherit}
.nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-height) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(255,245,240,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;justify-content:space-around;align-items:center;z-index:100;border-top:1px solid var(--border)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;color:var(--text3);font-size:10px;font-weight:600;padding:8px 14px;border-radius:16px;transition:all .3s;position:relative}
.nav-btn.active{color:var(--accent2)}.nav-btn.active::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:3px;border-radius:3px;background:var(--accent)}
.nav-btn .nav-icon{font-size:22px;line-height:1;transition:transform .3s}.nav-btn.active .nav-icon{transform:scale(1.15) translateY(-1px)}
.page{display:none;padding:20px 16px;position:relative;z-index:1;animation:fadeIn .35s ease}.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-header{font-size:26px;font-weight:900;margin-bottom:4px;color:var(--text);display:flex;align-items:center;gap:8px}
.page-header .cat-emoji{font-size:28px}.page-sub{color:var(--text2);font-size:13px;margin-bottom:20px;font-weight:400}
.card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.ex-item{display:flex;align-items:center;gap:12px;padding:14px;margin:8px 0;background:var(--surface);border-radius:var(--radius-sm);box-shadow:var(--shadow);border:1px solid var(--border);transition:all .2s}
.ex-item:active{transform:scale(0.98);box-shadow:var(--shadow-lg)}
.ex-num{min-width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:13px;font-weight:800;background:var(--accent-soft);color:var(--accent2)}
.ex-info{flex:1;min-width:0}.ex-name{font-size:14px;font-weight:700;color:var(--text)}.ex-detail{font-size:12px;color:var(--text2);margin-top:3px}
.ex-yt{width:38px;height:38px;border-radius:12px;background:#FFF0F0;color:#FF4444;display:flex;align-items:center;justify-content:center;font-size:15px;text-decoration:none;border:1px solid rgba(255,68,68,0.1);flex-shrink:0}.ex-yt:empty{display:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 24px;border-radius:14px;font-size:14px;font-weight:700;transition:all .2s}.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;box-shadow:0 4px 14px rgba(255,111,78,0.3)}
.btn-outline{background:var(--surface);color:var(--text);border:1.5px solid var(--border);box-shadow:var(--shadow)}
.btn-sm{padding:9px 18px;font-size:12px;border-radius:10px}.btn-full{width:100%}
.filter-row{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}.filter-row::-webkit-scrollbar{display:none}
.filter-chip{padding:9px 18px;border-radius:24px;background:var(--surface);color:var(--text2);font-size:13px;font-weight:600;white-space:nowrap;border:1.5px solid var(--border);transition:all .25s;box-shadow:0 1px 4px rgba(74,55,40,0.04)}
.filter-chip.active{background:var(--accent);color:white;border-color:var(--accent);box-shadow:0 3px 12px rgba(255,111,78,0.25)}
.log-input-group{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0}
.log-input{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:12px;color:var(--text);font-size:16px;text-align:center;width:100%;font-weight:600}
.log-input::placeholder{color:var(--text3);font-size:13px;font-weight:400}.log-input:focus{outline:none;border-color:var(--accent);background:white;box-shadow:0 0 0 3px var(--accent-soft)}
.timer-card{background:linear-gradient(135deg,#FFF5F8,#FFF0F5);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid rgba(255,176,200,0.2);box-shadow:0 4px 20px rgba(255,176,200,0.15);text-align:center}
.timer-display{font-size:60px;font-weight:900;text-align:center;font-variant-numeric:tabular-nums;color:var(--accent2);margin:12px 0;text-shadow:0 2px 8px rgba(255,111,78,0.15)}
.timer-label{text-align:center;color:var(--text2);font-size:15px;font-weight:600;margin-bottom:4px}
.timer-cat{font-size:36px;margin-bottom:8px}.timer-controls{display:flex;gap:10px;justify-content:center;margin-top:16px}
.history-date{font-size:12px;font-weight:700;color:var(--text2);padding:10px 0 6px;border-bottom:1.5px solid var(--border);margin-top:12px}
.history-row{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;padding:11px 4px;border-bottom:1px solid var(--border);font-size:13px;align-items:center}
.history-row span:first-child{font-weight:600}.history-row span:not(:first-child){text-align:right;color:var(--text2)}
.section-label{display:flex;align-items:center;gap:10px;margin:24px 0 14px;font-size:15px;font-weight:800;color:var(--text)}
.section-label::after{content:'';flex:1;height:1.5px;background:linear-gradient(to right,var(--border),transparent)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;color:var(--text2)}
.spinner{width:28px;height:28px;border:3px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.check-item{display:flex;align-items:center;gap:12px;padding:14px;margin:6px 0;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);box-shadow:var(--shadow);transition:all .3s}
.check-item:active{transform:scale(0.98)}.check-item.done{opacity:0.5;background:var(--surface2)}.check-item.done .ex-name{text-decoration:line-through;color:var(--text3)}
.checkbox{width:26px;height:26px;border-radius:8px;border:2px solid var(--text3);background:white;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0;font-size:14px;color:transparent}
.check-item.done .checkbox{background:var(--mint);border-color:var(--mint);color:white}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--mint);color:white;padding:12px 28px;border-radius:16px;font-size:14px;font-weight:700;z-index:200;transition:transform .35s ease;box-shadow:0 4px 16px rgba(126,207,179,0.35)}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}.empty-icon{font-size:52px;margin-bottom:14px}.empty-text{font-size:14px;line-height:1.6}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="page active" id="page-train">
<div class="page-header"><span class="cat-emoji">🏋️‍♀️</span> 今日訓練</div>
<div class="page-sub" id="today-date"></div>
<div class="filter-row" id="train-filter">
<button class="filter-chip active" data-type="全部">🐱 全部</button>
<button class="filter-chip" data-type="上肢推">💪 上肢推</button>
<button class="filter-chip" data-type="上肢拉">🤸 上肢拉</button>
<button class="filter-chip" data-type="膝主導">🦵 膝主導</button>
<button class="filter-chip" data-type="髖主導">🍑 髖主導</button>
</div>
<div id="today-menu-section" style="display:none"><div class="section-label">📋 今日菜單</div><div id="today-menu-list"></div></div>
<div class="section-label">🐾 動作庫</div>
<div id="exercise-list"><div class="loading"><div class="spinner"></div>載入動作庫中...</div></div>
</div>
<div class="page" id="page-log">
<div class="page-header"><span class="cat-emoji">📝</span> 訓練紀錄</div>
<div class="page-sub">記錄每一組的重量和次數 ✨</div>
<div id="log-active" style="display:none">
<div class="card" id="log-current-exercise">
<div class="card-title" id="log-ex-name"></div>
<div style="color:var(--text2);font-size:12px;margin-bottom:14px" id="log-ex-info"></div>
<div class="log-input-group">
<div><div style="font-size:11px;color:var(--text3);margin-bottom:5px;text-align:center;font-weight:600">組數</div><input class="log-input" type="number" id="log-sets" placeholder="組" inputmode="numeric"></div>
<div><div style="font-size:11px;color:var(--text3);margin-bottom:5px;text-align:center;font-weight:600">次數</div><input class="log-input" type="number" id="log-reps" placeholder="次" inputmode="numeric"></div>
<div><div style="font-size:11px;color:var(--text3);margin-bottom:5px;text-align:center;font-weight:600">重量kg</div><input class="log-input" type="number" id="log-weight" placeholder="kg" inputmode="decimal"></div>
</div>
<input class="log-input" type="text" id="log-notes" placeholder="備註（選填）" style="width:100%;margin:10px 0;text-align:left">
<button class="btn btn-primary btn-full" onclick="saveLog()">🐱 記錄這組！</button>
</div>
<div class="section-label">🐾 今日已記錄</div><div id="log-today-list"></div>
</div>
<div id="log-empty"><div class="empty"><div class="empty-icon">😺</div><div class="empty-text">從「今日訓練」點一個動作<br>開始記錄吧～</div></div></div>
<div class="section-label">📊 歷史紀錄</div>
<div id="log-history"><div class="loading"><div class="spinner"></div>載入紀錄中...</div></div>
</div>
<div class="page" id="page-warmup">
<div class="page-header"><span class="cat-emoji">🔥</span> 熱身收操</div>
<div class="page-sub">出門前久坐修復 → 健身房熱身 → 訓練後收操 🐈</div>
<div class="filter-row" id="warmup-filter">
<button class="filter-chip active" data-section="sedentary">🏠 久坐修復</button>
<button class="filter-chip" data-section="warmup">🔥 熱身</button>
<button class="filter-chip" data-section="cooldown">❄️ 收操</button>
<button class="filter-chip" data-section="evening">🌙 晚間修復</button>
</div>
<div class="filter-row" id="warmup-type-filter" style="display:none">
<button class="filter-chip active" data-part="上肢推">💪 上肢推</button>
<button class="filter-chip" data-part="上肢拉">🤸 上肢拉</button>
<button class="filter-chip" data-part="膝主導">🦵 膝主導</button>
<button class="filter-chip" data-part="髖主導">🍑 髖主導</button>
</div>
<div id="warmup-list"></div>
</div>
<div class="page" id="page-bedtime">
<div class="page-header"><span class="cat-emoji">🌙</span> 睡前拉伸</div>
<div class="page-sub">每天固定流程，像貓咪一樣柔軟地入睡 😽</div>
<div class="timer-card" id="bedtime-timer-card" style="display:none">
<div class="timer-cat" id="timer-cat-mood">😺</div>
<div class="timer-label" id="timer-exercise-name"></div>
<div class="timer-display" id="timer-display">00:00</div>
<div class="timer-controls">
<button class="btn btn-outline btn-sm" onclick="timerControl('reset')">重置</button>
<button class="btn btn-primary" onclick="timerControl('toggle')" id="timer-toggle-btn">▶ 開始</button>
<button class="btn btn-outline btn-sm" onclick="timerControl('next')">下一個 →</button>
</div>
</div>
<div id="bedtime-list"></div>
</div>
<nav class="nav">
<button class="nav-btn active" onclick="switchPage('train')" data-page="train"><span class="nav-icon">🏋️</span><span>訓練</span></button>
<button class="nav-btn" onclick="switchPage('log')" data-page="log"><span class="nav-icon">📊</span><span>紀錄</span></button>
<button class="nav-btn" onclick="switchPage('warmup')" data-page="warmup"><span class="nav-icon">🐱</span><span>熱身收操</span></button>
<button class="nav-btn" onclick="switchPage('bedtime')" data-page="bedtime"><span class="nav-icon">🌙</span><span>睡前拉伸</span></button>
</nav>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbxgOx4n6IUBY9nlb6RxuJQzFDec0lbT7z0SZjjkeIlHRDfNiZknX7u7Ap-51UmWGBpG/exec';
let exercises=[],todayLog=[],currentLogExercise=null,timerInterval=null,timerSeconds=0,timerTarget=0,timerRunning=false,currentBedtimeIndex=0;
const catMoods=['😺','😸','😻','🐱','😽','😹','🙀','😺'];
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('today-date').textContent=formatDateDisplay(new Date());loadExercises();loadHistory();setupFilters()});
async function loadExercises(){try{const r=await fetch(API_URL+'?action=getExercises');const data=await r.json();exercises=data.exercises||[];renderTrainingList();renderWarmupList();renderBedtimeList()}catch(e){document.getElementById('exercise-list').innerHTML='<div class="empty"><div class="empty-icon">😿</div><div class="empty-text">無法載入動作庫<br>請檢查網路連線</div></div>'}}
async function loadHistory(){try{const r=await fetch(API_URL+'?action=getLog');const data=await r.json();renderHistory(data.records||[])}catch(e){document.getElementById('log-history').innerHTML='<div class="empty"><div class="empty-icon">😿</div>無法載入紀錄</div>'}}
function renderTrainingList(filter='全部'){const list=document.getElementById('exercise-list');const train=exercises.filter(e=>e.type==='訓練');const filtered=filter==='全部'?train:train.filter(e=>e.bodyPart===filter);if(!filtered.length){list.innerHTML='<div class="empty"><div class="empty-icon">🐱</div><div class="empty-text">沒有找到動作</div></div>';return}list.innerHTML=filtered.map(e=>`<div class="ex-item" onclick="startLog('${e.id}')"><div class="ex-num">${e.defaultSets||'-'}</div><div class="ex-info"><div class="ex-name">${e.name}</div><div class="ex-detail">${e.defaultReps||'-'} 次 · ${e.defaultWeight?e.defaultWeight+'kg':'—'} · ${e.equipment||''}</div></div>${e.youtube?`<a class="ex-yt" href="${e.youtube}" target="_blank" onclick="event.stopPropagation()">▶</a>`:'<span class="ex-yt"></span>'}</div>`).join('')}
let warmupSection='sedentary',warmupPart='上肢推';
function renderWarmupList(){const list=document.getElementById('warmup-list');let filtered=[];if(warmupSection==='sedentary'){filtered=exercises.filter(e=>e.type==='熱身'&&e.sedentaryFix==='是')}else if(warmupSection==='warmup'){filtered=exercises.filter(e=>e.type==='熱身'&&e.sedentaryFix!=='是'&&e.bodyPart===warmupPart)}else if(warmupSection==='cooldown'){filtered=exercises.filter(e=>e.type==='收操'&&e.bodyPart===warmupPart&&!(e.notes||'').includes('晚間'))}else if(warmupSection==='evening'){filtered=exercises.filter(e=>(e.notes||'').includes('晚間'))}document.getElementById('warmup-type-filter').style.display=(warmupSection==='warmup'||warmupSection==='cooldown')?'flex':'none';if(!filtered.length){list.innerHTML='<div class="empty"><div class="empty-icon">😺</div><div class="empty-text">這裡還沒有動作</div></div>';return}list.innerHTML=filtered.map(e=>`<div class="check-item" onclick="toggleCheck(this)"><div class="checkbox">✓</div><div class="ex-info"><div class="ex-name">${e.name}</div><div class="ex-detail">${e.defaultReps||''} ${e.equipment&&e.equipment!=='徒手'?'· '+e.equipment:''}</div></div>${e.youtube?`<a class="ex-yt" href="${e.youtube}" target="_blank" onclick="event.stopPropagation()">▶</a>`:''}</div>`).join('')}
function toggleCheck(el){el.classList.toggle('done')}
function renderBedtimeList(){const list=document.getElementById('bedtime-list');const bedtime=exercises.filter(e=>e.type==='睡前拉伸').sort((a,b)=>{const na=(a.notes||'').match(/\d+/)||[99];const nb=(b.notes||'').match(/\d+/)||[99];return parseInt(na[0])-parseInt(nb[0])});if(!bedtime.length){list.innerHTML='<div class="empty"><div class="empty-icon">😴</div><div class="empty-text">沒有找到睡前拉伸動作</div></div>';return}list.innerHTML=bedtime.map((e,i)=>`<div class="check-item" onclick="startBedtimeTimer(${i})" data-index="${i}"><div class="ex-num" style="background:var(--pink-soft);color:#E8799A">${i+1}</div><div class="ex-info"><div class="ex-name">${e.name}</div><div class="ex-detail">${e.defaultReps||''}</div></div>${e.youtube?`<a class="ex-yt" href="${e.youtube}" target="_blank" onclick="event.stopPropagation()">▶</a>`:''}</div>`).join('')}
function startBedtimeTimer(index){const bedtime=exercises.filter(e=>e.type==='睡前拉伸').sort((a,b)=>{const na=(a.notes||'').match(/\d+/)||[99];const nb=(b.notes||'').match(/\d+/)||[99];return parseInt(na[0])-parseInt(nb[0])});if(index>=bedtime.length){document.getElementById('timer-cat-mood').textContent='😻';document.getElementById('timer-exercise-name').textContent='全部完成！全部完成！';document.getElementById('timer-display').textContent='🎉';return}currentBedtimeIndex=index;const ex=bedtime[index];const card=document.getElementById('bedtime-timer-card');card.style.display='block';card.scrollIntoView({behavior:'smooth',block:'start'});document.getElementById('timer-cat-mood').textContent=catMoods[index%catMoods.length];document.getElementById('timer-exercise-name').textContent=`${index+1}/${bedtime.length}　${ex.name}`;const reps=ex.defaultReps||'60秒';const match=reps.match(/(\d+)/);timerTarget=match?parseInt(match[0]):60;if(reps.includes('分鐘'))timerTarget*=60;if(reps.includes('左右'))timerTarget*=2;timerSeconds=0;timerRunning=false;clearInterval(timerInterval);updateTimerDisplay();document.getElementById('timer-toggle-btn').textContent='▶ 開始';document.querySelectorAll('#bedtime-list .check-item').forEach((el,i)=>{el.style.borderLeft=i===index?'3px solid var(--pink)':'none';el.style.paddingLeft=i===index?'11px':'14px'})}
function timerControl(action){if(action==='toggle'){if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timer-toggle-btn').textContent='▶ 繼續';document.getElementById('timer-cat-mood').textContent='😺'}else{timerRunning=true;document.getElementById('timer-toggle-btn').textContent='⏸ 暫停';document.getElementById('timer-cat-mood').textContent='😸';timerInterval=setInterval(()=>{timerSeconds++;updateTimerDisplay();if(timerSeconds>=timerTarget){clearInterval(timerInterval);timerRunning=false;document.getElementById('timer-toggle-btn').textContent='✓ 完成！';document.getElementById('timer-cat-mood').textContent='😻';if(navigator.vibrate)navigator.vibrate([200,100,200]);const items=document.querySelectorAll('#bedtime-list .check-item');if(items[currentBedtimeIndex])items[currentBedtimeIndex].classList.add('done')}},1000)}}else if(action==='reset'){clearInterval(timerInterval);timerSeconds=0;timerRunning=false;updateTimerDisplay();document.getElementById('timer-toggle-btn').textContent='▶ 開始';document.getElementById('timer-cat-mood').textContent='😺'}else if(action==='next'){clearInterval(timerInterval);timerRunning=false;const items=document.querySelectorAll('#bedtime-list .check-item');if(items[currentBedtimeIndex])items[currentBedtimeIndex].classList.add('done');startBedtimeTimer(currentBedtimeIndex+1)}}
function updateTimerDisplay(){const remaining=Math.max(0,timerTarget-timerSeconds);const min=Math.floor(remaining/60).toString().padStart(2,'0');const sec=(remaining%60).toString().padStart(2,'0');document.getElementById('timer-display').textContent=`${min}:${sec}`}
function startLog(exId){const ex=exercises.find(e=>e.id===exId);if(!ex)return;currentLogExercise=ex;document.getElementById('log-ex-name').textContent='🐾 '+ex.name;document.getElementById('log-ex-info').textContent=`${ex.bodyPart} · ${ex.equipment} · 建議 ${ex.defaultSets}×${ex.defaultReps} ${ex.defaultWeight?'@ '+ex.defaultWeight+'kg':''}`;document.getElementById('log-sets').value='';document.getElementById('log-reps').value='';document.getElementById('log-weight').value=ex.defaultWeight||'';document.getElementById('log-notes').value='';document.getElementById('log-active').style.display='block';document.getElementById('log-empty').style.display='none';switchPage('log');document.getElementById('log-current-exercise').scrollIntoView({behavior:'smooth'})}
async function saveLog(){if(!currentLogExercise)return;const sets=document.getElementById('log-sets').value;const reps=document.getElementById('log-reps').value;const weight=document.getElementById('log-weight').value;const notes=document.getElementById('log-notes').value;if(!sets||!reps){showToast('請填寫組數和次數');return}const record={date:formatDate(new Date()),exerciseId:currentLogExercise.id,exerciseName:currentLogExercise.name,sets:parseInt(sets),reps:parseInt(reps),weight:weight?parseFloat(weight):'',notes:notes};todayLog.push(record);renderTodayLog();try{await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addLog',records:[record]})});showToast('✓ 記錄成功！✓')}catch(e){showToast('儲存失敗，請稍後再試')}document.getElementById('log-sets').value=parseInt(sets)+1;document.getElementById('log-reps').value='';document.getElementById('log-notes').value=''}
function renderTodayLog(){const list=document.getElementById('log-today-list');if(!todayLog.length){list.innerHTML='<div style="color:var(--text3);font-size:13px;padding:8px">尚無紀錄</div>';return}list.innerHTML=todayLog.map(r=>`<div class="history-row"><span>${r.exerciseName}</span><span>第${r.sets}組</span><span>${r.reps}次</span><span>${r.weight?r.weight+'kg':'—'}</span></div>`).join('')}
function renderHistory(records){const list=document.getElementById('log-history');if(!records.length){list.innerHTML='<div class="empty" style="padding:24px"><div class="empty-icon">📊</div><div class="empty-text">還沒有歷史紀錄<br>開始訓練就會出現囉～</div></div>';return}const grouped={};records.reverse().forEach(r=>{const d=r.date||'未知日期';if(!grouped[d])grouped[d]=[];grouped[d].push(r)});let html='';Object.keys(grouped).slice(0,7).forEach(date=>{html+=`<div class="history-date">🐾 ${date}</div>`;grouped[date].forEach(r=>{html+=`<div class="history-row"><span>${r.exerciseName}</span><span>第${r.sets}組</span><span>${r.reps}次</span><span>${r.weight?r.weight+'kg':'—'}</span></div>`})});list.innerHTML=html}
function setupFilters(){document.getElementById('train-filter').addEventListener('click',e=>{if(!e.target.classList.contains('filter-chip'))return;document.querySelectorAll('#train-filter .filter-chip').forEach(c=>c.classList.remove('active'));e.target.classList.add('active');renderTrainingList(e.target.dataset.type)});document.getElementById('warmup-filter').addEventListener('click',e=>{if(!e.target.classList.contains('filter-chip'))return;document.querySelectorAll('#warmup-filter .filter-chip').forEach(c=>c.classList.remove('active'));e.target.classList.add('active');warmupSection=e.target.dataset.section;renderWarmupList()});document.getElementById('warmup-type-filter').addEventListener('click',e=>{if(!e.target.classList.contains('filter-chip'))return;document.querySelectorAll('#warmup-type-filter .filter-chip').forEach(c=>c.classList.remove('active'));e.target.classList.add('active');warmupPart=e.target.dataset.part;renderWarmupList()})}
function switchPage(page){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+page).classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.querySelector(`.nav-btn[data-page="${page}"]`).classList.add('active');window.scrollTo(0,0)}
function formatDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function formatDateDisplay(d){const days=['日','一','二','三','四','五','六'];return`${d.getMonth()+1}月${d.getDate()}日 星期${days[d.getDay()]} 🐾`}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
</script>
